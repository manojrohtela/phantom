<!doctype html><html><head><meta charset="utf-8"><style>
  * { margin:0; box-sizing:border-box; }
  html,body { width:1200px; height:630px; }
  body { font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif; color:#fff;
    background: radial-gradient(900px 500px at 80% -10%, rgba(124,58,237,.55), transparent 60%),
                radial-gradient(700px 500px at 0% 110%, rgba(219,39,119,.4), transparent 60%),
                linear-gradient(135deg,#0b0b12 0%,#16121f 100%);
    display:flex; flex-direction:column; justify-content:center; padding:80px; position:relative; overflow:hidden; }
  .badge { display:inline-flex; align-items:center; gap:10px; font-size:22px; font-weight:700; color:#c4b5fd;
    background:rgba(108,99,255,.14); border:1px solid rgba(108,99,255,.4); padding:8px 18px; border-radius:999px; width:max-content; }
  h1 { font-size:84px; line-height:1.02; font-weight:800; margin:26px 0 0; letter-spacing:-2px; }
  h1 .g { background:linear-gradient(90deg,#a78bfa,#f472b6); -webkit-background-clip:text; background-clip:text; color:transparent; }
  p { font-size:30px; color:#c9c9da; margin:22px 0 0; max-width:880px; line-height:1.35; }
  .row { display:flex; gap:16px; margin-top:40px; }
  .chip { font-size:24px; font-weight:700; padding:12px 22px; border-radius:14px; }
  .c1 { background:rgba(52,211,153,.16); color:#6ee7b7; border:1px solid rgba(52,211,153,.35); }
  .c2 { background:rgba(245,158,11,.16); color:#fcd34d; border:1px solid rgba(245,158,11,.4); }
  .ghost { position:absolute; right:70px; top:60px; font-size:160px; opacity:.9; filter:drop-shadow(0 0 40px rgba(167,139,250,.5)); }
  .brand { position:absolute; bottom:46px; left:80px; font-size:24px; color:#8a8a9e; }
</style></head>
<body>
  <div class="ghost">👻</div>
  <span class="badge">🫥 Invisible to Zoom · Meet · Teams · OBS</span>
  <h1>Phantom — the AI copilot<br/><span class="g">they can't see.</span></h1>
  <p>A screen-share-invisible interview & meeting assistant. Live answers on your screen, hidden from every capture.</p>
  <div class="row">
    <span class="chip c1">Free 3-day trial</span>
    <span class="chip c2">₹200 lifetime · launch offer</span>
  </div>
  <div class="brand">phantom.heyagenthive.com</div>
</body></html>
